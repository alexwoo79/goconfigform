title: "运动员训练记录表单"
fields:
  - name: training_date
    label: 训练日期
    type: date
    required: true
    placeholder: 请选择训练日期
  - name: athlete_name
    label: 运动员姓名
    type: text
    required: true
    placeholder: 请输入运动员姓名
  - name: running_distance
    label: 跑步距离(km)
    type: number
    required: true
    placeholder: 请输入跑步距离
    min: "0"
    step: "0.1"
  - name: training_duration
    label: 训练时长
    type: text
    required: true
    placeholder: 格式：2:32:43 (小时:分钟:秒)
  - name: training_status
    label: 训练状态描述
    type: textarea
    required: false
    placeholder: 请描述本次训练的状态、感受和表现
    rows: 4
buttons:
  - type: submit
    text: 提交记录
    class: btn-success
  - type: link
    text: 返回首页
    href: /
    class: btn-info